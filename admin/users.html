<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>إدارة المستخدمين</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>

<script>
renderLayout(
  "إدارة المستخدمين",
  "إنشاء مستخدم وربطه بأكثر من دور",
  "admin-users",
  `
    <div class="admin-users-hero">
      <div>
        <h3>مركز التحكم في المستخدمين</h3>
        <p>يمكن ربط المستخدم بأكثر من دور: مخازن + مشتريات + POS.</p>
      </div>
      <div class="admin-user-stats">
        <div><strong id="totalUsers">0</strong><span>مستخدم</span></div>
        <div><strong id="activeUsers">0</strong><span>نشط</span></div>
        <div><strong id="disabledUsers">0</strong><span>موقوف</span></div>
      </div>
    </div>

    <div class="panel admin-form-panel">
      <h3 id="formTitle">إضافة مستخدم جديد</h3>

      <div class="user-form-grid">
        <input id="userId" type="hidden" />
        <input id="username" placeholder="اسم المستخدم" />
        <input id="fullName" placeholder="الاسم الكامل" />
        <input id="password" type="password" placeholder="كلمة المرور" />

        <button class="primary-btn" onclick="saveUser()">حفظ المستخدم</button>
        <button class="export-btn" onclick="resetForm()">تفريغ</button>
      </div>

      <div class="roles-box">
        <h4>الأدوار المسموحة</h4>
        <div id="rolesCheckboxes" class="roles-checkbox-grid"></div>
      </div>
      <div class="roles-box">
        <h4>الشركات المسموحة</h4>
        <p class="muted-text">اختر الشركات التي يستطيع المستخدم رؤية بياناتها.</p>
        <div id="companiesCheckboxes" class="roles-checkbox-grid"></div>
       </div>
       <div class="roles-box">
       <h4>الفروع المسموحة داخل كل شركة</h4>
       <p class="muted-text">اختر الفروع التي يستطيع المستخدم رؤية بياناتها في تقارير الفروع ونقاط البيع والعملاء. التقارير ذات نطاق «شركة فقط» لا تتأثر بهذا الاختيار.</p>
       <div id="posBranchesCheckboxes" class="roles-checkbox-grid"></div>
       </div>
       <div class="roles-box report-access-box">
         <div class="report-access-heading">
           <div>
             <h4>صلاحيات التقارير المباشرة</h4>
             <p class="muted-text">اختر نوع التقارير، ثم امنح المستخدم التقارير المطلوبة مباشرة. صلاحيات الأدوار تظل فعالة بالإضافة إلى الاختيارات هنا.</p>
           </div>
           <div class="report-access-actions">
             <button type="button" class="export-btn" onclick="setAllDirectReports(true)">تحديد الكل</button>
             <button type="button" class="export-btn" onclick="setAllDirectReports(false)">إلغاء الكل</button>
           </div>
         </div>
         <div id="directReportsArea"></div>
       </div>
      </div>

    <div class="panel">
      <h3>قائمة المستخدمين</h3>
      <div id="usersCards" class="users-card-grid"></div>
    </div>
  `
);

let roles = [];
let users = [];
let companyCatalog = [];
let posBranchCatalogByCompany = {};
let reportCatalog = [];


async function loadRoles() {
  const response = await apiGet("/roles");
  roles = response.data || [];

  document.getElementById("rolesCheckboxes").innerHTML = roles.map(role => `
    <label class="permission-item">
      <input type="checkbox" class="role-check" value="${role.id}">
      ${role.name}
    </label>
  `).join("");
}

async function loadUsers() {
  const response = await apiGet("/users");
  users = response.data || [];

  document.getElementById("totalUsers").innerText = users.length;
  document.getElementById("activeUsers").innerText = users.filter(u => u.is_active).length;
  document.getElementById("disabledUsers").innerText = users.filter(u => !u.is_active).length;

  renderUsers();
}

function renderUsers() {
  document.getElementById("usersCards").innerHTML = users.map(user => `
    <div class="user-card ${user.is_active ? "" : "disabled-user"}">
      <div class="user-avatar">${(user.full_name || user.username || "?").slice(0, 1).toUpperCase()}</div>

      <div class="user-info">
        <h4>${user.full_name || "-"}</h4>
        <p>@${user.username}</p>
        <span class="role-chip">${user.role_name || "متعدد الأدوار"}</span>
        <span class="status-chip ${user.is_active ? "active" : "inactive"}">
          ${user.is_active ? "نشط" : "موقوف"}
        </span>
      </div>

      <div class="user-actions">
        <button onclick="editUser(${user.id})">تعديل</button>
        <button onclick="changePassword(${user.id})">كلمة المرور</button>
        <button onclick="toggleUser(${user.id}, ${user.is_active})">
          ${user.is_active ? "تعطيل" : "تفعيل"}
        </button>
      </div>
    </div>
  `).join("");
}

function getSelectedRoleIds() {
  return Array.from(document.querySelectorAll(".role-check:checked"))
    .map(input => Number(input.value));
}

function setSelectedRoleIds(roleIds = []) {
  document.querySelectorAll(".role-check").forEach(input => {
    input.checked = roleIds.includes(Number(input.value));
  });
}

async function loadCompanyCatalog() {
  const response = await apiGet("/company-access/catalog");

  companyCatalog = response.data || [];

  document.getElementById("companiesCheckboxes").innerHTML =
    companyCatalog.map(company => `
      <label class="permission-item">
        <input type="checkbox" class="company-check" value="${company.companyId}" onchange="syncCompanyBranchAvailability()">
        ${company.companyName}
      </label>
    `).join("");
}

function getSelectedCompanyIds() {
  return Array.from(document.querySelectorAll(".company-check:checked"))
    .map(input => Number(input.value));
}

function setSelectedCompanyIds(companyIds = []) {
  document.querySelectorAll(".company-check").forEach(input => {
    input.checked = companyIds.includes(Number(input.value));
  });
}

async function loadDirectReportsCatalog() {
  const response = await apiGet("/permissions/catalog/grouped");
  reportCatalog = response.data || [];
  renderDirectReports();
}

function renderDirectReports() {
  const container = document.getElementById("directReportsArea");
  if (!container) return;

  container.innerHTML = reportCatalog.map(type => `
    <section class="permission-type-block" data-report-type="${type.code}">
      <div class="permission-type-head">
        <label class="permission-type-toggle">
          <input type="checkbox" onchange="toggleReportType('${type.code}', this.checked)">
          <strong>${type.label}</strong>
        </label>
        <span>${type.modules.reduce((sum, module) => sum + module.reports.length, 0)} تقرير</span>
      </div>
      <div class="permission-modules-grid">
        ${type.modules.map(module => `
          <div class="permission-module-card">
            <div class="permission-module-head">
              <h5>${module.label}</h5>
              <button type="button" onclick="toggleReportModule('${type.code}', '${module.code}', true)">تحديد القسم</button>
            </div>
            <div class="permissions-grid">
              ${module.reports.map(report => `
                <label class="permission-item report-permission-item">
                  <input type="checkbox" class="direct-report-check"
                    data-report-type="${type.code}"
                    data-report-module="${module.code}"
                    data-report-scope="${report.scope}"
                    value="${report.code}"
                    onchange="syncReportTypeToggles()">
                  <span><strong>${report.label}</strong><small>${report.scopeLabel}</small></span>
                </label>
              `).join("")}
            </div>
          </div>
        `).join("")}
      </div>
    </section>
  `).join("");
}

function getSelectedDirectReports() {
  return Array.from(document.querySelectorAll(".direct-report-check:checked"))
    .map(input => input.value);
}

function setSelectedDirectReports(codes = []) {
  const allowed = new Set(codes);
  document.querySelectorAll(".direct-report-check").forEach(input => {
    input.checked = allowed.has(input.value);
  });
  syncReportTypeToggles();
}

function setAllDirectReports(checked) {
  document.querySelectorAll(".direct-report-check").forEach(input => {
    input.checked = checked;
  });
  syncReportTypeToggles();
}

function toggleReportType(typeCode, checked) {
  document.querySelectorAll(`.direct-report-check[data-report-type="${typeCode}"]`)
    .forEach(input => { input.checked = checked; });
  syncReportTypeToggles();
}

function toggleReportModule(typeCode, moduleCode, checked) {
  document.querySelectorAll(
    `.direct-report-check[data-report-type="${typeCode}"][data-report-module="${moduleCode}"]`
  ).forEach(input => { input.checked = checked; });
  syncReportTypeToggles();
}

function syncReportTypeToggles() {
  document.querySelectorAll(".permission-type-block").forEach(block => {
    const boxes = Array.from(block.querySelectorAll(".direct-report-check"));
    const toggle = block.querySelector(".permission-type-toggle input");
    const checkedCount = boxes.filter(box => box.checked).length;
    if (!toggle) return;
    toggle.checked = boxes.length > 0 && checkedCount === boxes.length;
    toggle.indeterminate = checkedCount > 0 && checkedCount < boxes.length;
  });
}

async function saveUser() {
  const id = document.getElementById("userId").value;
  const username = document.getElementById("username").value.trim();
  const fullName = document.getElementById("fullName").value.trim();
  const password = document.getElementById("password").value.trim();

  const roleIds = getSelectedRoleIds();
  const companyIds = getSelectedCompanyIds();
  const selectedBranchesByCompany = getSelectedPosBranchesByCompany();
  const directReports = getSelectedDirectReports();
  const hasBranchScopedReports = Array.from(
    document.querySelectorAll('.direct-report-check[data-report-scope="company_branch"]:checked')
  ).length > 0;

  if (!id && (!username || !password)) {
    alert("اسم المستخدم وكلمة المرور مطلوبين");
    return;
  }

  if (!roleIds.length) {
    alert("اختر دور واحد على الأقل");
    return;
  }

  if (!companyIds.length) {
    alert("اختر شركة واحدة على الأقل");
    return;
  }

  let userId = Number(id);

  if (id) {
    const updateResponse = await apiPatch(`/users/${id}`, {
      fullName,
      role: "user"
    });

    if (!updateResponse.success) {
      alert(updateResponse.message || "فشل تعديل المستخدم");
      return;
    }
  } else {
    const createResponse = await apiPost("/users", {
      username,
      fullName,
      password,
      role: "user"
    });

    if (!createResponse.success) {
      alert(createResponse.message || "فشل إنشاء المستخدم");
      return;
    }

    userId = Number(createResponse.data.id);
  }

  const rolesResponse = await apiPut(`/users/${userId}/roles`, {
    roleIds
  });

  if (!rolesResponse.success) {
    alert(rolesResponse.message || "فشل حفظ أدوار المستخدم");
    return;
  }

  const companiesResponse = await apiPut(`/company-access/users/${userId}`, {
    companyIds
  });

  if (!companiesResponse.success) {
    alert(companiesResponse.message || "فشل حفظ شركات المستخدم");
    return;
  }
  for (const company of companyCatalog) {
  const companyId = Number(company.companyId);

  const branches =
    selectedBranchesByCompany[companyId] || [];

  const branchResponse = await apiPut(
    `/pos-branch-access/users/${userId}`,
    {
      companyId,
      branches
    }
  );

  if (!branchResponse.success) {
    alert(branchResponse.message || `فشل حفظ فروع POS لشركة ${company.companyName}`);
    return;
  }
}

  const permissionsResponse = await apiPut(`/permissions/users/${userId}`, {
    permissions: directReports
  });

  if (!permissionsResponse.success) {
    alert(permissionsResponse.message || "فشل حفظ صلاحيات التقارير المباشرة");
    return;
  }

  if (hasBranchScopedReports) {
    const companiesWithoutBranches = companyIds.filter(companyId =>
      !(selectedBranchesByCompany[companyId] || []).length
    );
    if (companiesWithoutBranches.length) {
      alert("اختر فرعًا واحدًا على الأقل لكل شركة لأن المستخدم لديه تقارير بنطاق شركة وفرع");
      return;
    }
  }

  alert("تم حفظ المستخدم والشركات والفروع وصلاحيات التقارير بنجاح");

  resetForm();
  await loadUsers();
}
async function loadPosBranchCatalog() {
  posBranchCatalogByCompany = {};

  for (const company of companyCatalog) {
    const response = await apiGet("/pos-branch-access/catalog", {
      companyId: company.companyId
    });

    posBranchCatalogByCompany[company.companyId] = response.data || [];
  }

  renderPosBranchCheckboxes();
}

function renderPosBranchCheckboxes() {
  const container = document.getElementById("posBranchesCheckboxes");
  if (!container) return;

  container.innerHTML = companyCatalog.map(company => {
    const branches = posBranchCatalogByCompany[company.companyId] || [];

    if (!branches.length) {
      return `
        <div class="permission-group-block">
          <h5>${company.companyName}</h5>
          <p class="muted-text">لا توجد فروع POS لهذه الشركة</p>
        </div>
      `;
    }

    return `
      <div class="permission-group-block" data-branch-company-block="${company.companyId}">
        <div class="permission-module-head">
          <h5>${company.companyName}</h5>
          <button type="button" onclick="toggleCompanyBranches(${company.companyId}, true)">كل الفروع</button>
        </div>

        ${branches.map(branch => `
          <label class="permission-item">
            <input
              type="checkbox"
              class="pos-branch-check"
              data-company-id="${company.companyId}"
              value="${branch.branchCode}"
            >
            ${branch.branchName}
          </label>
        `).join("")}
      </div>
    `;
  }).join("");
  syncCompanyBranchAvailability();
}

function toggleCompanyBranches(companyId, checked) {
  document.querySelectorAll(`.pos-branch-check[data-company-id="${companyId}"]:not(:disabled)`)
    .forEach(input => { input.checked = checked; });
}

function syncCompanyBranchAvailability() {
  const selectedCompanies = new Set(getSelectedCompanyIds());
  document.querySelectorAll("[data-branch-company-block]").forEach(block => {
    const companyId = Number(block.dataset.branchCompanyBlock);
    const enabled = selectedCompanies.has(companyId);
    block.classList.toggle("permission-scope-disabled", !enabled);
    block.querySelectorAll("input, button").forEach(control => {
      control.disabled = !enabled;
      if (!enabled && control.matches("input")) control.checked = false;
    });
  });
}

function findBranchInCatalog(companyId, branchCode) {
  const branches = posBranchCatalogByCompany[companyId] || [];

  return branches.find(branch =>
    String(branch.branchCode) === String(branchCode)
  );
}

function getSelectedPosBranchesByCompany() {
  const result = {};

  document.querySelectorAll(".pos-branch-check:checked").forEach(input => {
    const companyId = Number(input.dataset.companyId);
    const branchCode = input.value;

    const branch = findBranchInCatalog(companyId, branchCode);

    if (!branch) return;

    if (!result[companyId]) {
      result[companyId] = [];
    }

    result[companyId].push({
      branchCode: branch.branchCode,
      branchName: branch.branchName,
      sourceLocationId: branch.sourceLocationId
    });
  });

  return result;
}

function setSelectedPosBranches(rows = []) {
  document.querySelectorAll(".pos-branch-check").forEach(input => {
    const companyId = Number(input.dataset.companyId);

    input.checked = rows.some(row =>
      Number(row.companyId) === companyId &&
      String(row.branchCode) === String(input.value)
    );
  });
}

function clearSelectedPosBranches() {
  document.querySelectorAll(".pos-branch-check").forEach(input => {
    input.checked = false;
  });
}


async function editUser(id) {
  const user = users.find(u => u.id === id);
  if (!user) return;

  document.getElementById("formTitle").innerText = "تعديل المستخدم";
  document.getElementById("userId").value = user.id;
  document.getElementById("username").value = user.username;
  document.getElementById("username").disabled = true;
  document.getElementById("fullName").value = user.full_name || "";
  document.getElementById("password").value = "";
  document.getElementById("password").placeholder = "اتركها فارغة";

  const response = await apiGet(`/users/${id}/roles`);
  setSelectedRoleIds(response.data || []);
  const companyResponse = await apiGet(`/company-access/users/${id}`);
setSelectedCompanyIds(
  (companyResponse.data || []).map(item => Number(item.companyId))
);
syncCompanyBranchAvailability();
const branchResponse = await apiGet(`/pos-branch-access/users/${id}`);

setSelectedPosBranches(branchResponse.data || []);
const permissionsResponse = await apiGet(`/permissions/users/${id}`);
setSelectedDirectReports(permissionsResponse.data || []);
}

async function changePassword(id) {
  const password = prompt("اكتب كلمة المرور الجديدة:");
  if (!password) return;

  await apiPatch(`/users/${id}/password`, { password });
  alert("تم تغيير كلمة المرور");
}

async function toggleUser(id, isActive) {
  await apiPatch(`/users/${id}`, {
    isActive: !isActive
  });

  await loadUsers();
}

function resetForm() {
  document.getElementById("formTitle").innerText = "إضافة مستخدم جديد";
  document.getElementById("userId").value = "";
  document.getElementById("username").value = "";
  document.getElementById("username").disabled = false;
  document.getElementById("fullName").value = "";
  document.getElementById("password").value = "";
  document.getElementById("password").placeholder = "كلمة المرور";
  setSelectedRoleIds([]);
  setSelectedCompanyIds([]);
  clearSelectedPosBranches();
  setSelectedDirectReports([]);
}

async function init() {
  await loadRoles();
  await loadCompanyCatalog();
  await loadPosBranchCatalog();
  await loadDirectReportsCatalog();
  await loadUsers();
}

init();
</script>
</body>
</html>
