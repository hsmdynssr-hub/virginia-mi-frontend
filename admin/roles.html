<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="0; url=./report-classification.html" />
  <title>الأدوار والصلاحيات</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<script>window.location.replace("./report-classification.html");</script>

<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>

<script>

renderLayout(
  "الأدوار والصلاحيات",
  "إدارة صلاحيات التقارير حسب الدور",
  "admin-roles",
  `
    <div class="panel">

      <div class="filters">

        <select id="roleSelect"></select>

        <button
          class="primary-btn"
          onclick="savePermissions()">

          حفظ الصلاحيات

        </button>

      </div>

    </div>

    <div id="permissionsArea"></div>
  `
);

let allPermissions = [];
let currentPermissions = [];

async function loadRoles() {

  const response =
    await apiGet("/roles");

  const roles =
    response.data || [];

  document.getElementById("roleSelect").innerHTML =
    roles.map(role => `
      <option value="${role.id}">
        ${role.name}
      </option>
    `).join("");

  if (roles.length) {
    await loadPermissions();
  }
}

async function loadPermissions() {

  const roleId =
    document.getElementById("roleSelect").value;

  const catalogResponse =
    await apiGet("/roles/catalog");

  allPermissions =
    catalogResponse.data || [];

  const roleResponse =
    await apiGet(
      `/roles/${roleId}/permissions`
    );

  currentPermissions =
    roleResponse.data || [];

  renderPermissions();
}

function renderPermissions() {
  const types = {};

  allPermissions.forEach(permission => {
    const typeCode = permission.reportType || "management";
    if (!types[typeCode]) {
      types[typeCode] = {
        label: permission.reportTypeLabel || "تقارير إدارية",
        order: permission.reportTypeOrder || 99,
        modules: {}
      };
    }
    if (!types[typeCode].modules[permission.module]) {
      types[typeCode].modules[permission.module] = {
        label: permission.moduleLabel || permission.module,
        items: []
      };
    }
    types[typeCode].modules[permission.module].items.push(permission);
  });

  document.getElementById("permissionsArea").innerHTML = Object.entries(types)
    .sort(([, a], [, b]) => a.order - b.order)
    .map(([typeCode, type]) => `
      <div class="panel permission-type-block">
        <div class="permission-type-head">
          <h3>${type.label}</h3>
          <button type="button" class="export-btn" onclick="toggleRoleType('${typeCode}', true)">تحديد النوع بالكامل</button>
        </div>
        <div class="permission-modules-grid">
          ${Object.entries(type.modules).map(([moduleCode, module]) => `
            <section class="permission-module-card">
              <div class="permission-module-head"><h5>${module.label}</h5></div>
              <div class="permissions-grid">
                ${module.items.map(permission => `
                  <label class="permission-item report-permission-item">
                    <input type="checkbox"
                      data-role-report-type="${typeCode}"
                      data-role-report-module="${moduleCode}"
                      value="${permission.code}"
                      ${currentPermissions.includes(permission.code) ? "checked" : ""}>
                    <span><strong>${permission.label}</strong><small>${permission.scopeLabel || "شركة فقط"}</small></span>
                  </label>
                `).join("")}
              </div>
            </section>
          `).join("")}
        </div>
      </div>
    `).join("");

}

function toggleRoleType(typeCode, checked) {
  document.querySelectorAll(`[data-role-report-type="${typeCode}"]`)
    .forEach(input => { input.checked = checked; });
}

async function savePermissions() {

  const roleId =
    document.getElementById("roleSelect").value;

  const permissions =
    Array.from(
      document.querySelectorAll(
        "#permissionsArea input:checked"
      )
    ).map(item => item.value);

  const response =
    await apiPut(
      `/roles/${roleId}/permissions`,
      {
        permissions
      }
    );

  if (response.success) {

    alert("تم حفظ الصلاحيات بنجاح");

  } else {

    alert("حدث خطأ");

  }
}

document
  .getElementById("roleSelect")
  .addEventListener(
    "change",
    loadPermissions
  );

loadRoles();

</script>

</body>
</html>
