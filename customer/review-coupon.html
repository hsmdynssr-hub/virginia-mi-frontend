<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>كوبون فيرجينيا</title>
  <link rel="stylesheet" href="./review-sms.css?v=review-hero-medal-20260712" />
  <script src="./review-sms.js?v=customer-mobile-20260712" defer></script>
</head>

<body data-page="coupon">
  <main class="crsms-review-shell">
    <section class="crsms-review-card crsms-coupon-card">
      <div class="crsms-brand">Virginia Olive</div>

      <div id="couponLoading" class="crsms-review-message">
        جاري تحميل بيانات الكوبون...
      </div>

      <div id="couponError" class="crsms-review-message crsms-error" hidden></div>

      <div id="couponContent" hidden>
        <section class="crsms-review-hero">
          <div class="crsms-hero-copy">
            <span>هدية من فيرجينيا</span>
            <strong>شحن مجاني لطلبك القادم 🎁</strong>
            <p>الكوبون شخصي ومربوط برقم هاتفك على Shopify.</p>
          </div>
        </section>

        <button type="button" id="claimCouponBtn" class="crsms-claim-coupon-btn">
          إصدار كوبون الشحن المجاني
        </button>

        <section id="couponBox" class="crsms-coupon-box" hidden>
          <span>كود الكوبون</span>
          <strong id="couponCode">-</strong>
          <small id="couponExpiry"></small>
          <button type="button" id="copyCouponBtn">نسخ الكوبون</button>
        </section>

        <div id="couponMessage" class="crsms-review-message" hidden></div>

        <footer class="crsms-review-footer">
          <span>الكوبون يستخدم مرة واحدة خلال مدة صلاحيته</span>
          <strong>فيرجينيا</strong>
        </footer>
      </div>
    </section>
  </main>
</body>
</html>
