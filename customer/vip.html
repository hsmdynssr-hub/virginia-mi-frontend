<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>VIP Customers</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/layout.js"></script>

  <script>
    renderLayout("عملاء VIP", "تصنيف العملاء الأعلى قيمة ومتعددي القنوات", "customer-vip", `<div id="reportArea"></div>`);

    async function loadReport() {
      try {
        showLoading();

        const report = await apiGet("/customer/vip", getFilters());
        const data = report.data || {};
        const summary = data.summary || {};
        const rows = data.vipCustomers || [];
        const insights = data.insights || [];

        document.getElementById("reportArea").innerHTML = `
          ${renderKpis([
            kpiCard("عدد VIP", summary.vipCount, "عدد العملاء المصنفين VIP."),
            kpiCard("Hybrid VIP", summary.hybridVipCount, "عملاء اشتروا من POS و Sales معًا."),
            kpiCard("High Value", summary.highValueVipCount, "عملاء تجاوزوا حد القيمة."),
            kpiCard("Loyal", summary.loyalVipCount, "عملاء لديهم تكرار شراء عالي.")
          ])}

          ${renderPanel("التحليل", `
            <div class="analysis-box">
              ${insights.map((item) => `<p>${item}</p>`).join("")}
            </div>
          `)}

          ${renderPanel("جدول عملاء VIP", renderTable(
            [
              { key: "customerName", label: "العميل", hint: "اسم العميل." },
              { key: "channelType", label: "نوع القناة", hint: "POS_ONLY / SALE_ONLY / HYBRID." },
              { key: "customerTier", label: "التصنيف", hint: "تصنيف العميل حسب القيمة أو القناة." },
              { key: "saleOrdersCount", label: "طلبات Sales", hint: "عدد طلبات البيع." },
              { key: "posOrdersCount", label: "فواتير POS", hint: "عدد فواتير POS." },
              { key: "saleAmount", label: "Sales Amount", hint: "إجمالي قيمة Sales." },
              { key: "posAmount", label: "POS Amount", hint: "إجمالي قيمة POS." },
              { key: "totalAmount", label: "Total", hint: "إجمالي قيمة العميل." },
              { key: "averageOrderValue", label: "Avg Order", hint: "متوسط قيمة الطلب." }
            ],
            rows
          ))}
        `;
      } catch (error) {
        showError(error);
      }
    }

    document.getElementById("loadBtn").addEventListener("click", loadReport);
    document.getElementById("companySelect").addEventListener("change", loadReport);
    loadReport();
  </script>
</body>
</html>
