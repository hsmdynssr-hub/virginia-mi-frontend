<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

  <title>Production Reports</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <script>
    renderLayout(
      "تقارير الإنتاج",
      "كل تقارير الإنتاج والتصنيع في مكان واحد",
      "production",
      `
        <div class="reports-grid">
          <a class="report-card" href="./daily.html">
            <span class="page-pill">Daily Production</span>
            <h3>إنتاج يومي</h3>

              متابعة أوامر التصنيع اليومية، عدد الأوامر، المنتج الفعلي،

            <span class="page-pill">MO Cost</span>
