<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تشغيل المخازن وإعادة الطلب</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .op-filter-card,.op-section{background:#fff;border:1px solid #dbe5ef;border-radius:18px;padding:18px;margin-bottom:18px;box-shadow:0 8px 24px rgba(15,38,61,.06)}
    .op-filter-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;align-items:end}.op-filter-grid label{display:block;font-size:.82rem;font-weight:700;margin-bottom:6px}.op-filter-grid select,.op-filter-grid input{width:100%;min-height:42px;border:1px solid #cbd8e6;border-radius:10px;padding:8px 10px}
    .op-actions{display:flex;gap:8px}.op-actions button{min-height:42px;border:0;border-radius:10px;padding:0 18px;font-weight:800;cursor:pointer}.op-load{background:#087f8c;color:#fff}.op-export{background:#198754;color:#fff}
    .op-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:12px;margin-bottom:18px}.op-kpi{background:linear-gradient(135deg,#fff,#eef7f8);border:1px solid #d7e8eb;border-top:4px solid #087f8c;border-radius:15px;padding:14px}.op-kpi.danger{border-top-color:#dc3545}.op-kpi.warning{border-top-color:#f59e0b}.op-kpi strong{display:block;font-size:1.65rem;margin-top:5px}
    .op-tabs{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px}.op-tab{white-space:nowrap;border:1px solid #cad7e5;background:#f5f8fb;border-radius:10px;padding:9px 13px;cursor:pointer}.op-tab.active{background:#102a43;color:#fff}.op-pane{display:none}.op-pane.active{display:block}.op-table{overflow:auto;max-height:640px;border:1px solid #dde6ef;border-radius:12px}.op-table table{border-collapse:collapse;min-width:1250px;width:100%}.op-table th,.op-table td{padding:10px;border-bottom:1px solid #e4ebf2;text-align:right;white-space:nowrap}.op-table th{position:sticky;top:0;background:#102a43;color:#fff;z-index:1}.op-table tr:hover td{background:#f2f8fa}.risk{display:inline-block;padding:4px 9px;border-radius:999px;font-weight:800}.risk-very_critical{background:#fee2e2;color:#991b1b}.risk-critical{background:#fef3c7;color:#92400e}.risk-normal{background:#dcfce7;color:#166534}.risk-overstock,.risk-slow{background:#ede9fe;color:#5b21b6}.op-note{background:#eef8ff;border-right:4px solid #0284c7;padding:11px;margin:6px 0;border-radius:8px}.hidden{display:none!important}
  </style>
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/report-export.js"></script>
  <script src="./reorder-risk.js"></script>
</body>
</html>
