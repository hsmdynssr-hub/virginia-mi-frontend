<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>POS Returns</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/layout.js"></script>

  <script>
    renderLayout("مرتجعات POS", "فصل وتحليل المرتجعات بعيدًا عن الخصومات والعروض", "pos-returns", `<div id="reportArea"></div>`);

    async function loadReport() {
      try {
        showLoading();
        const report = await apiGet("/pos/return-intelligence", getFilters());
        const data = report.data || {};
        const summary = data.summary || {};
        const rows = data.byProduct || [];

        document.getElementById("reportArea").innerHTML = `
          ${renderKpis([
            kpiCard("عدد الفواتير", summary.ordersCount, "إجمالي فواتير POS."),
            kpiCard("سطور المرتجع", summary.returnLinesCount, "عدد سطور المنتجات المرتجعة فقط."),
            kpiCard("قيمة المرتجع", summary.returnValue, "قيمة المرتجعات المفصولة عن الخصومات."),
            kpiCard("نسبة المرتجع", `${summary.returnRate || 0}%`, "قيمة المرتجعات ÷ قيمة المبيعات.")
          ])}

          ${renderPanel("المرتجعات حسب المنتج", renderTable(
            [
              { key: "productName", label: "المنتج", hint: "اسم المنتج المرتجع." },
              { key: "returnLinesCount", label: "عدد السطور", hint: "عدد سطور المرتجع." },
              { key: "returnQty", label: "كمية مرتجعة", hint: "إجمالي الكمية المرتجعة." },
              { key: "returnValue", label: "قيمة المرتجع", hint: "إجمالي قيمة المرتجع." }
            ],
            rows
          ))}
        `;
      } catch (error) {
        showError(error);
      }
    }

    document.getElementById("loadBtn").addEventListener("click", loadReport);
    document.getElementById("companySelect").addEventListener("change", loadReport);
    loadReport();
  </script>
</body>
</html>
