<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>POS Branches</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/layout.js"></script>

  <script>
    renderLayout("الفروع ونقاط البيع", "مقارنة أداء الفروع والمعارض ونقاط البيع", "pos-branches", `<div id="reportArea"></div>`);

    async function loadReport() {
      try {
        showLoading();
        const report = await apiGet("/pos/branch-intelligence", getFilters());
        const data = report.data || {};
        const summary = data.summary || {};
        const rows = data.branches || [];

        document.getElementById("reportArea").innerHTML = `
          ${renderKpis([
            kpiCard("عدد الفروع", summary.branchesCount, "عدد نقاط البيع التي ظهرت في التقرير."),
            kpiCard("عدد الفواتير", summary.ordersCount, "إجمالي فواتير POS."),
            kpiCard("أفضل فرع", summary.topBranch?.branchName || "-", "أعلى فرع حسب صافي المبيعات."),
            kpiCard("أقل فرع", summary.lowestBranch?.branchName || "-", "أقل فرع حسب صافي المبيعات.")
          ])}

          ${renderPanel("جدول أداء الفروع", renderTable(
            [
              { key: "branchName", label: "نقطة البيع", hint: "اسم POS أو الفرع." },
              { key: "actualSourceLocationName", label: "اللوكيشن الفعلي", hint: "اللوكيشن الذي خرج منه المخزون فعليًا حسب stock.move." },
              { key: "ordersCount", label: "الفواتير", hint: "عدد الفواتير." },
              { key: "grossSales", label: "Gross Sales", hint: "إجمالي البيع." },
              { key: "returns", label: "Returns", hint: "قيمة المرتجعات." },
              { key: "netSales", label: "Net Sales", hint: "صافي البيع." },
              { key: "margin", label: "Margin", hint: "إجمالي الهامش." },
              { key: "marginPercent", label: "Margin %", hint: "نسبة الهامش." },
              { key: "returnRate", label: "Return %", hint: "نسبة المرتجعات." },
              { key: "customerCaptureRate", label: "Customer Capture %", hint: "نسبة تسجيل العملاء." }
            ],
            rows
          ))}
        `;
      } catch (error) {
        showError(error);
      }
    }

    document.getElementById("loadBtn").addEventListener("click", loadReport);
    document.getElementById("companySelect").addEventListener("change", loadReport);
    loadReport();
  </script>
</body>
</html>
