<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>Purchase Price Intelligence</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/layout.js"></script>

  <script>
    renderLayout(
      "تغير أسعار الشراء",
      "مقارنة آخر سعر شراء بالسعر السابق لكل خامة أو منتج",
      "purchase-price",
      `
        <div class="panel">
          <h3>فلاتر إضافية</h3>
          <div class="filters">
            <input id="categoryId" placeholder="Category ID اختياري" />
            <input id="productId" placeholder="Product ID اختياري" />
            <input id="vendorId" placeholder="Vendor ID اختياري" />
          </div>
        </div>

        <div id="reportArea"></div>
      `
    );

    function formatMoney(value) {
      return Number(value || 0).toLocaleString("en-US", {
        maximumFractionDigits: 4
      });
    }

    function buildExtraFilters() {
      return {
        ...getFilters(),
        categoryId: document.getElementById("categoryId").value || "",
        productId: document.getElementById("productId").value || "",
        vendorId: document.getElementById("vendorId").value || ""
      };
    }

    function renderPriceTable(title, rows) {
      return renderPanel(title, renderTable(
        [
          { key: "productName", label: "الصنف", hint: "اسم الخام أو المنتج." },
          { key: "latestVendorName", label: "آخر مورد", hint: "المورد في آخر توريدة." },
          { key: "latestDate", label: "آخر تاريخ", hint: "تاريخ آخر شراء." },
          { key: "latestPrice", label: "آخر سعر", hint: "آخر سعر شراء." },
          { key: "previousPrice", label: "السعر السابق", hint: "السعر قبل آخر توريدة." },
          { key: "difference", label: "الفرق", hint: "آخر سعر - السعر السابق." },
          { key: "changePercent", label: "نسبة التغير %", hint: "نسبة الزيادة أو الانخفاض." },
          { key: "totalPurchasedQty", label: "كمية مشتراة", hint: "إجمالي الكمية المطلوبة." },
          { key: "totalAmount", label: "إجمالي القيمة", hint: "إجمالي قيمة الشراء للصنف." },
          { key: "recordsCount", label: "عدد السجلات", hint: "عدد مرات شراء الصنف في الفترة." }
        ],
        rows
      ));
    }

    async function loadReport() {
      try {
        showLoading();

        const report = await apiGet("/purchase/price-intelligence", buildExtraFilters());
        const data = report.data || {};
        const summary = data.summary || {};
        const increased = data.increased || [];
        const decreased = data.decreased || [];
        const topPurchased = data.topPurchased || [];
        const insights = data.insights || [];

        document.getElementById("reportArea").innerHTML = `
          ${renderKpis([
            kpiCard("عدد الأصناف", summary.productsCount, "عدد الأصناف التي تم تحليل أسعارها."),
            kpiCard("سطور الشراء", summary.linesCount, "عدد سطور أوامر الشراء الداخلة في التحليل."),
            kpiCard("أصناف زاد سعرها", summary.increasedProductsCount, "عدد الأصناف التي آخر سعر لها أعلى من السعر السابق."),
            kpiCard("أصناف انخفض سعرها", summary.decreasedProductsCount, "عدد الأصناف التي آخر سعر لها أقل من السعر السابق.")
          ])}

          ${renderPanel("التحليل", `
            <div class="analysis-box">
              ${insights.map((i) => `<p>${i}</p>`).join("") || "<p>لا يوجد تحليل.</p>"}
            </div>
          `)}

          ${renderPriceTable("أعلى 20 زيادة في الأسعار", increased)}
          ${renderPriceTable("أعلى 20 انخفاض في الأسعار", decreased)}
          ${renderPriceTable("أعلى 20 صنف حسب قيمة الشراء", topPurchased)}
        `;
      } catch (error) {
        showError(error);
      }
    }

    document.getElementById("loadBtn").addEventListener("click", loadReport);
    document.getElementById("companySelect").addEventListener("change", loadReport);

    loadReport();
  </script>
</body>
</html>
