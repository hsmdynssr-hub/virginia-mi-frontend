<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>Purchase Daily</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/layout.js"></script>

  <script>
    renderLayout("تقرير المشتريات اليومي", "متابعة أوامر الشراء اليومية والموردين", "purchase-daily", `<div id="reportArea"></div>`);

    async function loadReport() {
      try {
        showLoading();

        const report = await apiGet("/purchase/daily", getFilters());
        const data = report.data || {};
        const summary = data.analysis?.executiveSummary || {};
        const vendors = data.vendorSummary || [];
        const products = data.productSummary || [];
        const insights = data.analysis?.insights || [];

        document.getElementById("reportArea").innerHTML = `
          ${renderKpis([
            kpiCard("أوامر الشراء", summary.totalOrders, "عدد أوامر الشراء اليومية."),
            kpiCard("قيمة الشراء", summary.totalAmount, "إجمالي قيمة أوامر الشراء."),
            kpiCard("الكمية المطلوبة", summary.totalOrderedQty, "إجمالي الكمية المطلوبة."),
            kpiCard("نسبة الاستلام", `${summary.receivedPercent || 0}%`, "المستلم ÷ المطلوب.")
          ])}

          ${renderPanel("التحليل", `
            <div class="analysis-box">
              ${insights.map((i) => `<p>${i}</p>`).join("") || "<p>لا يوجد تحليل.</p>"}
            </div>
          `)}

          ${renderPanel("الموردين", renderTable(
            [
              { key: "vendorName", label: "المورد", hint: "اسم المورد." },
              { key: "ordersCount", label: "الأوامر", hint: "عدد أوامر الشراء." },
              { key: "totalUntaxed", label: "قبل الضريبة", hint: "قيمة الشراء قبل الضريبة." },
              { key: "totalTax", label: "الضريبة", hint: "إجمالي الضريبة." },
              { key: "totalAmount", label: "الإجمالي", hint: "إجمالي أوامر الشراء." }
            ],
            vendors
          ))}

          ${renderPanel("المنتجات / الخامات", renderTable(
            [
              { key: "productName", label: "الصنف", hint: "اسم الصنف المشترى." },
              { key: "orderedQty", label: "المطلوب", hint: "الكمية المطلوبة." },
              { key: "receivedQty", label: "المستلم", hint: "الكمية المستلمة." },
              { key: "remainingToReceiveQty", label: "المتبقي", hint: "كمية لم تستلم بعد." },
              { key: "averagePriceUnit", label: "متوسط السعر", hint: "متوسط سعر الشراء." },
              { key: "totalAmount", label: "القيمة", hint: "إجمالي قيمة الصنف." }
            ],
            products
          ))}
        `;
      } catch (error) {
        showError(error);
      }
    }

    document.getElementById("loadBtn").addEventListener("click", loadReport);
    document.getElementById("companySelect").addEventListener("change", loadReport);
    loadReport();
  </script>
</body>
</html>
