<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

</head>

  <script src="../js/api.js"></script>

  <script>
    renderLayout(
      "تقارير التارجت / Forecast",
      "كل أدوات التارجت والتخطيط والإنجاز في مكان واحد",
      "forecast",
      `
        <div class="reports-grid">
          <a class="report-card" href="./products.html">
            <span class="page-pill">Products</span>
            <h3>منتجات التارجت</h3>
            <p>
              عرض المنتجات المتاحة للتارجت والتخطيط ومراجعة بيانات المنتجات

            </p>
          </a>

          <a class="report-card" href="./targets.html">
            <span class="page-pill">Target Setup</span>
            <h3>إدارة التارجت</h3>

              رصيد المنتج التام والخامات.

          </a>

              أدخل فوركاست المنتجات واحسب نسبة تحقيق المبيعات، احتياج التصنيع،
              جاهزية الخامات، والعجز مع دعم BOM متعددة المستويات.
            </p>
          </a>
        </div>
      `
    );
